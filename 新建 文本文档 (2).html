<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时光倒计时 | Time Countdown</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        .mono-font {
            font-family: 'JetBrains Mono', monospace;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }
        .digit-box {
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.05) 100%);
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.3);
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .progress-ring {
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
        .progress-ring-circle {
            transition: stroke-dashoffset 0.35s;
            transform-origin: 50% 50%;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .floating {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255,255,255,0.2); }
            50% { box-shadow: 0 0 40px rgba(255,255,255,0.4); }
        }
        .glow {
            animation: pulse-glow 3s ease-in-out infinite;
        }
        .slide-in {
            animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        input[type="datetime-local"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #f0f;
            position: absolute;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }
    </style>
</head>
<body class="text-white relative">

    <!-- 背景装饰 -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-0 left-0 w-96 h-96 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
        <div class="absolute top-0 right-0 w-96 h-96 bg-yellow-500 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>
        <div class="absolute -bottom-8 left-20 w-96 h-96 bg-pink-500 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-4000"></div>
    </div>

    <div class="container mx-auto px-4 py-8 max-w-6xl relative z-10">
        
        <!-- 标题 -->
        <header class="text-center mb-12 floating">
            <h1 class="text-5xl md:text-7xl font-bold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-white via-purple-200 to-pink-200">
                时光倒计时
            </h1>
            <p class="text-lg text-purple-200 opacity-80">珍惜每一刻，期待每一个未来</p>
        </header>

        <!-- 主倒计时显示区 -->
        <div id="mainDisplay" class="glass rounded-3xl p-8 md:p-12 mb-8 glow slide-in">
            <div class="text-center mb-8">
                <h2 id="eventTitle" class="text-3xl md:text-4xl font-bold mb-2 text-white">选择一个倒计时</h2>
                <p id="eventDate" class="text-purple-200 text-lg">或创建属于你自己的特殊时刻</p>
            </div>

            <!-- 倒计时数字 -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-8 max-w-4xl mx-auto mb-8">
                <div class="digit-box rounded-2xl p-6 text-center">
                    <div id="days" class="mono-font text-4xl md:text-6xl font-bold mb-2">00</div>
                    <div class="text-sm uppercase tracking-widest text-purple-200">天</div>
                </div>
                <div class="digit-box rounded-2xl p-6 text-center">
                    <div id="hours" class="mono-font text-4xl md:text-6xl font-bold mb-2">00</div>
                    <div class="text-sm uppercase tracking-widest text-purple-200">时</div>
                </div>
                <div class="digit-box rounded-2xl p-6 text-center">
                    <div id="minutes" class="mono-font text-4xl md:text-6xl font-bold mb-2">00</div>
                    <div class="text-sm uppercase tracking-widest text-purple-200">分</div>
                </div>
                <div class="digit-box rounded-2xl p-6 text-center">
                    <div id="seconds" class="mono-font text-4xl md:text-6xl font-bold mb-2">00</div>
                    <div class="text-sm uppercase tracking-widest text-purple-200">秒</div>
                </div>
            </div>

            <!-- 进度环 -->
            <div class="flex justify-center items-center gap-8 mb-6">
                <div class="relative w-32 h-32">
                    <svg class="progress-ring w-32 h-32" viewBox="0 0 120 120">
                        <circle class="text-gray-700" stroke-width="8" stroke="currentColor" fill="transparent" r="52" cx="60" cy="60"/>
                        <circle id="progressCircle" class="text-purple-400 progress-ring-circle" stroke-width="8" stroke-linecap="round" stroke="currentColor" fill="transparent" r="52" cx="60" cy="60"/>
                    </svg>
                    <div class="absolute inset-0 flex items-center justify-center flex-col">
                        <span id="progressPercent" class="text-2xl font-bold">0%</span>
                        <span class="text-xs text-purple-200">已过</span>
                    </div>
                </div>
                <div class="text-left">
                    <p class="text-sm text-purple-200 mb-1">总进度</p>
                    <p id="totalTime" class="text-lg font-semibold">计算中...</p>
                    <p id="remainingTime" class="text-sm text-purple-300 mt-2">剩余时间</p>
                </div>
            </div>
        </div>

        <!-- 预设场景 -->
        <div class="mb-8">
            <h3 class="text-xl font-semibold mb-4 text-center text-purple-200">快速选择</h3>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <button onclick="setPreset('newyear')" class="glass-card rounded-2xl p-4 text-center cursor-pointer group">
                    <div class="text-3xl mb-2 group-hover:scale-110 transition-transform">🎆</div>
                    <div class="font-semibold">新年倒计时</div>
                    <div class="text-xs text-purple-300 mt-1">2027年元旦</div>
                </button>
                <button onclick="setPreset('spring')" class="glass-card rounded-2xl p-4 text-center cursor-pointer group">
                    <div class="text-3xl mb-2 group-hover:scale-110 transition-transform">🧧</div>
                    <div class="font-semibold">春节倒计时</div>
                    <div class="text-xs text-purple-300 mt-1">农历新年</div>
                </button>
                <button onclick="setPreset('weekend')" class="glass-card rounded-2xl p-4 text-center cursor-pointer group">
                    <div class="text-3xl mb-2 group-hover:scale-110 transition-transform">🎉</div>
                    <div class="font-semibold">周末倒计时</div>
                    <div class="text-xs text-purple-300 mt-1">下一个周六</div>
                </button>
                <button onclick="setPreset('custom')" class="glass-card rounded-2xl p-4 text-center cursor-pointer group border-2 border-purple-400/50">
                    <div class="text-3xl mb-2 group-hover:scale-110 transition-transform">✨</div>
                    <div class="font-semibold">自定义</div>
                    <div class="text-xs text-purple-300 mt-1">创建专属时刻</div>
                </button>
            </div>
        </div>

        <!-- 自定义表单 -->
        <div id="customForm" class="glass rounded-2xl p-6 md:p-8 hidden slide-in">
            <h3 class="text-2xl font-bold mb-6 text-center">创建自定义倒计时</h3>
            <div class="max-w-md mx-auto space-y-4">
                <div>
                    <label class="block text-sm font-medium text-purple-200 mb-2">事件名称</label>
                    <input type="text" id="customTitle" placeholder="例如：我的生日、项目上线..." 
                           class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-purple-300 focus:outline-none focus:border-purple-400 focus:ring-2 focus:ring-purple-400/50 transition-all">
                </div>
                <div>
                    <label class="block text-sm font-medium text-purple-200 mb-2">目标日期时间</label>
                    <input type="datetime-local" id="customDate" 
                           class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white focus:outline-none focus:border-purple-400 focus:ring-2 focus:ring-purple-400/50 transition-all">
                </div>
                <button onclick="startCustomCountdown()" 
                        class="w-full py-3 bg-gradient-to-r from-purple-500 to-pink-500 rounded-xl font-semibold text-white shadow-lg hover:shadow-purple-500/50 transform hover:scale-[1.02] transition-all active:scale-95">
                    开始倒计时
                </button>
            </div>
        </div>

        <!-- 多个倒计时管理 -->
        <div class="mt-12">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold">我的倒计时</h3>
                <button onclick="toggleCustomForm()" class="px-4 py-2 rounded-full bg-white/10 hover:bg-white/20 transition-all text-sm">
                    + 新建倒计时
                </button>
            </div>
            <div id="savedCountdowns" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- 动态生成的倒计时卡片 -->
            </div>
        </div>

    </div>

    <script>
        let currentCountdown = null;
        let countdownInterval = null;
        let savedCountdowns = JSON.parse(localStorage.getItem('countdowns')) || [];

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 设置默认倒计时为新年
            setPreset('newyear');
            renderSavedCountdowns();
            
            // 每分钟检查一次保存的倒计时
            setInterval(updateSavedCountdowns, 60000);
        });

        function setPreset(type) {
            const now = new Date();
            let targetDate, title;

            switch(type) {
                case 'newyear':
                    targetDate = new Date(now.getFullYear() + 1, 0, 1);
                    title = `${now.getFullYear() + 1}年新年`;
                    break;
                case 'spring':
                    // 简单计算下一个春节（实际日期需要农历计算，这里用近似值）
                    targetDate = getNextSpringFestival();
                    title = '春节';
                    break;
                case 'weekend':
                    const daysUntilSaturday = (6 - now.getDay() + 7) % 7 || 7;
                    targetDate = new Date(now);
                    targetDate.setDate(now.getDate() + daysUntilSaturday);
                    targetDate.setHours(0, 0, 0, 0);
                    title = '周末';
                    break;
                case 'custom':
                    document.getElementById('customForm').classList.remove('hidden');
                    document.getElementById('customForm').scrollIntoView({ behavior: 'smooth' });
                    return;
            }

            startCountdown(targetDate, title);
        }

        function getNextSpringFestival() {
            // 2026年春节是2月17日，2027年是2月6日
            const now = new Date();
            const year = now.getFullYear();
            const springDates = {
                2026: new Date(2026, 1, 17), // 2月17日
                2027: new Date(2027, 1, 6),  // 2月6日
                2028: new Date(2028, 0, 26)  // 1月26日
            };
            
            if (now < springDates[year]) return springDates[year];
            if (now < springDates[year + 1]) return springDates[year + 1];
            return springDates[year + 2] || new Date(year + 1, 1, 15); // 默认
        }

        function toggleCustomForm() {
            const form = document.getElementById('customForm');
            form.classList.toggle('hidden');
            if (!form.classList.contains('hidden')) {
                form.scrollIntoView({ behavior: 'smooth' });
            }
        }

        function startCustomCountdown() {
            const title = document.getElementById('customTitle').value || '自定义事件';
            const dateInput = document.getElementById('customDate').value;
            
            if (!dateInput) {
                alert('请选择日期时间');
                return;
            }

            const targetDate = new Date(dateInput);
            if (targetDate <= new Date()) {
                alert('目标时间必须在未来');
                return;
            }

            // 保存到本地存储
            const countdown = {
                id: Date.now(),
                title: title,
                targetDate: targetDate.toISOString(),
                createdAt: new Date().toISOString()
            };
            
            savedCountdowns.push(countdown);
            localStorage.setItem('countdowns', JSON.stringify(savedCountdowns));
            
            renderSavedCountdowns();
            startCountdown(targetDate, title);
            
            // 隐藏表单
            document.getElementById('customForm').classList.add('hidden');
            document.getElementById('customTitle').value = '';
            document.getElementById('customDate').value = '';
            
            // 创建成功动画
            createConfetti();
        }

        function startCountdown(targetDate, title) {
            if (countdownInterval) clearInterval(countdownInterval);
            
            currentCountdown = { targetDate, title, startDate: new Date() };
            
            document.getElementById('eventTitle').textContent = title;
            document.getElementById('eventDate').textContent = formatDate(targetDate);
            
            updateCountdown();
            countdownInterval = setInterval(updateCountdown, 1000);
        }

        function updateCountdown() {
            if (!currentCountdown) return;
            
            const now = new Date();
            const diff = currentCountdown.targetDate - now;
            
            if (diff <= 0) {
                // 倒计时结束
                document.getElementById('days').textContent = '00';
                document.getElementById('hours').textContent = '00';
                document.getElementById('minutes').textContent = '00';
                document.getElementById('seconds').textContent = '00';
                document.getElementById('eventTitle').textContent = currentCountdown.title + ' - 时刻已到！';
                createConfetti();
                if (countdownInterval) clearInterval(countdownInterval);
                return;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = String(days).padStart(2, '0');
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');

            // 更新进度环
            updateProgress(diff);
        }

        function updateProgress(remainingMs) {
            const totalDuration = currentCountdown.targetDate - currentCountdown.startDate;
            const elapsed = totalDuration - remainingMs;
            const percentage = Math.min(100, Math.max(0, (elapsed / totalDuration) * 100));
            
            const circle = document.getElementById('progressCircle');
            const radius = circle.r.baseVal.value;
            const circumference = radius * 2 * Math.PI;
            
            circle.style.strokeDasharray = `${circumference} ${circumference}`;
            const offset = circumference - (percentage / 100) * circumference;
            circle.style.strokeDashoffset = offset;
            
            document.getElementById('progressPercent').textContent = Math.round(percentage) + '%';
            
            // 计算总时间和剩余时间
            const totalDays = Math.floor(totalDuration / (1000 * 60 * 60 * 24));
            const remainingDays = Math.floor(remainingMs / (1000 * 60 * 60 * 24));
            document.getElementById('totalTime').textContent = `共 ${totalDays} 天`;
            document.getElementById('remainingTime').textContent = `还剩 ${remainingDays} 天`;
        }

        function formatDate(date) {
            const options = { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric', 
                hour: '2-digit', 
                minute: '2-digit' 
            };
            return date.toLocaleDateString('zh-CN', options);
        }

        function renderSavedCountdowns() {
            const container = document.getElementById('savedCountdowns');
            container.innerHTML = '';
            
            // 按日期排序
            const sorted = [...savedCountdowns].sort((a, b) => 
                new Date(a.targetDate) - new Date(b.targetDate)
            );

            sorted.forEach(item => {
                const target = new Date(item.targetDate);
                const now = new Date();
                const diff = target - now;
                
                if (diff <= 0) return; // 跳过已过期

                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                
                const card = document.createElement('div');
                card.className = 'glass-card rounded-2xl p-4 cursor-pointer relative group';
                card.onclick = () => {
                    startCountdown(target, item.title);
                    document.getElementById('mainDisplay').scrollIntoView({ behavior: 'smooth' });
                };
                
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <h4 class="font-bold text-lg mb-1">${item.title}</h4>
                            <p class="text-sm text-purple-200">${formatDate(target)}</p>
                        </div>
                        <div class="text-right">
                            <div class="text-2xl font-bold mono-font">${days}</div>
                            <div class="text-xs text-purple-300">天后</div>
                        </div>
                    </div>
                    <button onclick="event.stopPropagation(); deleteCountdown(${item.id})" 
                            class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity p-2 hover:bg-red-500/20 rounded-full text-red-300">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                `;
                
                container.appendChild(card);
            });

            if (sorted.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center text-purple-300 py-8">暂无保存的倒计时，创建一个吧！</div>';
            }
        }

        function updateSavedCountdowns() {
            // 清理已过期的倒计时
            const now = new Date();
            savedCountdowns = savedCountdowns.filter(item => new Date(item.targetDate) > now);
            localStorage.setItem('countdowns', JSON.stringify(savedCountdowns));
            renderSavedCountdowns();
        }

        function deleteCountdown(id) {
            if (confirm('确定要删除这个倒计时吗？')) {
                savedCountdowns = savedCountdowns.filter(item => item.id !== id);
                localStorage.setItem('countdowns', JSON.stringify(savedCountdowns));
                renderSavedCountdowns();
            }
        }

        function createConfetti() {
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff'];
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                confetti.style.opacity = Math.random();
                document.body.appendChild(confetti);
                
                setTimeout(() => confetti.remove(), 5000);
            }
        }

        // 添加一些动画样式
        const style = document.createElement('style');
        style.textContent = `
            @keyframes blob {
                0% { transform: translate(0px, 0px) scale(1); }
                33% { transform: translate(30px, -50px) scale(1.1); }
                66% { transform: translate(-20px, 20px) scale(0.9); }
                100% { transform: translate(0px, 0px) scale(1); }
            }
            .animate-blob {
                animation: blob 7s infinite;
            }
            .animation-delay-2000 {
                animation-delay: 2s;
            }
            .animation-delay-4000 {
                animation-delay: 4s;
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
